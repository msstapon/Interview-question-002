server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback — createWebHistory routes (/register, /welcome) must
    # resolve to index.html rather than 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed, immutable build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache the entry HTML so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
